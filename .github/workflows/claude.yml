name: Claude Code

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Direct prompt for Claude Code. Use for plan/validation runs before creating GitHub tickets.'
        required: true
        type: string
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install gstack for Claude Code
        run: |
          set -euo pipefail
          rm -rf ~/.claude/skills/gstack
          mkdir -p ~/.claude/skills
          git clone --single-branch --depth 1 https://github.com/garrytan/gstack.git ~/.claude/skills/gstack
          cd ~/.claude/skills/gstack
          ./setup

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prompt || '' }}
          claude_args: |
            --max-turns 8
            --append-system-prompt "gstack is installed at ~/.claude/skills/gstack. Use gstack skills/slash-command workflows when useful for planning, review, QA, release, and product/engineering critique. Prefer this lifecycle: office-hours/product interrogation and validation before execution tickets; then plan, implement only what is requested, verify with tests/builds, and report concise results. For workflow_dispatch prompts, return a concise plan/validation artifact suitable for Hermes to copy into Notion before creating GitHub issues."
